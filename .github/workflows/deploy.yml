# Reports Dokploy deployment status on GitHub (replaces CI).
#
# Dokploy should keep Auto Deploy enabled — this workflow only monitors the
# deployment that the Dokploy GitHub webhook starts on push.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   DOKPLOY_URL              — e.g. https://dokploy.yourdomain.com (no trailing slash)
#   DOKPLOY_API_KEY          — Profile → API/CLI keys in Dokploy
#   DOKPLOY_APPLICATION_ID   — Application ID from Dokploy (app settings URL)

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dokploy:
    name: Dokploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Monitor Dokploy deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          POLL_INTERVAL: 10
          TIMEOUT_SECONDS: 900
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_URL:-}" ] || [ -z "${DOKPLOY_API_KEY:-}" ] || [ -z "${DOKPLOY_APPLICATION_ID:-}" ]; then
            echo "::error::Missing Dokploy secrets. Add DOKPLOY_URL, DOKPLOY_API_KEY, and DOKPLOY_APPLICATION_ID in repository secrets."
            exit 1
          fi

          started_at=$(date +%s)
          echo "Waiting for Dokploy to start a deployment for commit ${GITHUB_SHA::7}…"

          fetch_deployments() {
            curl -sf \
              -H "Accept: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              "${DOKPLOY_URL}/api/deployment.all?applicationId=${DOKPLOY_APPLICATION_ID}"
          }

          latest_status="unknown"
          end_time=$((started_at + TIMEOUT_SECONDS))

          while [ "$(date +%s)" -lt "$end_time" ]; do
            response="$(fetch_deployments || true)"

            if [ -z "$response" ]; then
              echo "Dokploy API unreachable; retrying in ${POLL_INTERVAL}s…"
              sleep "$POLL_INTERVAL"
              continue
            fi

            latest_status="$(echo "$response" | jq -r 'if type == "array" and length > 0 then .[0].status else "unknown" end')"
            latest_created="$(echo "$response" | jq -r 'if type == "array" and length > 0 then .[0].createdAt else "" end')"
            latest_title="$(echo "$response" | jq -r 'if type == "array" and length > 0 then (.[0].title // "deployment") else "deployment" end')"

            if [ -n "$latest_created" ]; then
              latest_epoch="$(date -d "$latest_created" +%s 2>/dev/null || echo 0)"
              # Only track deployments started after this workflow began (with 30s slack for clock skew).
              if [ "$latest_epoch" -ge $((started_at - 30)) ]; then
                case "$latest_status" in
                  done)
                    echo "✅ Dokploy deployment succeeded (${latest_title})."
                    exit 0
                    ;;
                  error)
                    echo "::error::Dokploy deployment failed (${latest_title}). Check Dokploy logs for details."
                    exit 1
                    ;;
                  pending|running|idle)
                    echo "Status: ${latest_status} — ${latest_title} (${latest_created})"
                    ;;
                  *)
                    echo "Status: ${latest_status} — waiting…"
                    ;;
                esac
              else
                echo "Latest deployment is older than this push; waiting for Dokploy webhook…"
              fi
            fi

            sleep "$POLL_INTERVAL"
          done

          echo "::error::Timed out after ${TIMEOUT_SECONDS}s (last status: ${latest_status})."
          exit 1
