# Required GitHub Actions secrets (repository settings → Secrets and variables → Actions):
#   PUBLIC_SUPABASE_URL      — Supabase project URL (build + e2e product reads)
#   PUBLIC_SUPABASE_KEY      — Supabase anon key (build + browser client)
#   SUPABASE_KEY             — Supabase service role key (server loads)
#   PUBLIC_RAZORPAY_ID       — Razorpay key id (checkout UI)
#   RAZORPAY_KEY             — Razorpay secret (server)
#   API_ORIGIN               — Hono API origin for proxy (e2e cart specs skip without DB)
# Optional: PUBLIC_SITE_URL, SENTRY_DSN, PUBLIC_SENTRY_DSN

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      PUBLIC_RAZORPAY_ID: ${{ secrets.PUBLIC_RAZORPAY_ID }}
      RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
      API_ORIGIN: ${{ secrets.API_ORIGIN }}
      PUBLIC_SITE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Svelte check
        run: npx svelte-check

      - name: API typecheck
        run: npm run check:api

      - name: Unit tests (root)
        run: npx vitest run

      - name: Unit tests (api)
        run: npm run test -w @scweb/api

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: npm run test:e2e
