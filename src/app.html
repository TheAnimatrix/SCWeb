<!doctype html>
<html lang="en" class="max-w-full w-full">
	<head>
		<meta charset="utf-8" />
		<script>
			(function () {
				const theme = localStorage.getItem('sc-theme') === 'light' ? 'light' : 'dark';
				document.documentElement.classList.add(theme);
				document.documentElement.style.colorScheme = theme;
			})();
		</script>
		<title>Selfcrafted India</title>
		<meta
			name="description"
			content="Selfcrafted India is a platform for indie creators to sell their products directly to customers. We provide a range of tools and resources to help you get started." />
		<meta
			name="keywords"
			content="Selfcrafted India, indie creators, sell products, tools and resources" />
		<meta name="author" content="Selfcrafted India" />
		<meta name="robots" content="index, follow" />
		<meta name="googlebot" content="index, follow" />
		<meta name="bingbot" content="index, follow" />
		<meta name="alexa" content="index, follow" />
		<meta name="yandex" content="index, follow" />
		<meta name="msvalidate.01" content="00000000000000000000000000000000" />
		<meta name="google-site-verification" content="00000000000000000000000000000000" />
		<meta name="msvalidate.01" content="00000000000000000000000000000000" />
		<meta name="google-site-verification" content="00000000000000000000000000000000" />

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" sizes="128x128" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="mask-icon" href="%sveltekit.assets%/pwa/pwa-monochrome.svg" color="#000000" />
		<meta name="theme-color" content="#000000" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Selfcrafted" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="max-w-full w-full">
		<div style="display: contents; max-width: 100%; width: 100%">%sveltekit.body%</div>
	</body>
</html>
