<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
	<defs>
		<filter id="pixel-fine" x="-20%" y="-20%" width="140%" height="140%">
			<feTurbulence
				type="turbulence"
				baseFrequency="0.38"
				numOctaves="1"
				stitchTiles="stitch"
				seed="4"
				result="noise"
			/>
			<feComponentTransfer in="noise">
				<feFuncA type="discrete" tableValues="0 0.62" />
				<feFuncR type="discrete" tableValues="0 1" />
				<feFuncG type="discrete" tableValues="0 1" />
				<feFuncB type="discrete" tableValues="0 1" />
			</feComponentTransfer>
		</filter>
		<filter id="pixel-coarse" x="-20%" y="-20%" width="140%" height="140%">
			<feTurbulence
				type="turbulence"
				baseFrequency="0.11"
				numOctaves="1"
				stitchTiles="stitch"
				seed="9"
				result="noise"
			/>
			<feComponentTransfer in="noise">
				<feFuncA type="discrete" tableValues="0 0.48" />
				<feFuncR type="discrete" tableValues="0 1" />
				<feFuncG type="discrete" tableValues="0 1" />
				<feFuncB type="discrete" tableValues="0 1" />
			</feComponentTransfer>
		</filter>
		<radialGradient id="fade" cx="50%" cy="50%" r="50%">
			<stop offset="0%" stop-color="white" stop-opacity="0" />
			<stop offset="56%" stop-color="white" stop-opacity="0" />
			<stop offset="70%" stop-color="white" stop-opacity="1" />
			<stop offset="86%" stop-color="white" stop-opacity="0.42" />
			<stop offset="100%" stop-color="white" stop-opacity="0" />
		</radialGradient>
		<mask id="radial-fade">
			<rect width="100%" height="100%" fill="url(#fade)" />
		</mask>
	</defs>
	<g mask="url(#radial-fade)">
		<rect width="100%" height="100%" filter="url(#pixel-fine)" />
		<rect width="100%" height="100%" filter="url(#pixel-coarse)" opacity="0.85" />
	</g>
</svg>
